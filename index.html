/* Meat Connection — Webfonts
   SUBSTITUTION NOTE: No brand font files were provided. Using closest Google Fonts:
   - Oswald  : condensed butcher-signage display (wordmark + headings)
   - Archivo : grotesque body / UI text
   Replace these @import lines with local @font-face + .woff2 files when brand fonts arrive. */
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Archivo:wght@400;500;600;700&display=swap');

/* Meat Connection — Color tokens
   Brand: charcoal #1D1D1D (primary) + butcher red #C10F10 (secondary) */
:root {
  /* ---- Brand base ---- */
  --mc-charcoal: #1D1D1D;   /* primary ink / surfaces */
  --mc-red:      #C10F10;   /* butcher red — secondary / action */
  --mc-red-deep: #9A0C0D;   /* pressed / hover-dark red */
  --mc-red-bright:#E23A30;  /* highlight red */

  /* ---- Charcoal / neutral scale (warm-cool neutral) ---- */
  --mc-ink-900: #141414;
  --mc-ink-800: #1D1D1D;
  --mc-ink-700: #2A2A2A;
  --mc-ink-600: #3A3A3A;
  --mc-ink-500: #595959;
  --mc-ink-400: #7C7C7C;
  --mc-ink-300: #A6A6A6;
  --mc-ink-200: #D2D0CC;
  --mc-ink-100: #E7E4DE;
  --mc-ink-50:  #F4F2ED;   /* warm paper tint */

  /* ---- Warm neutrals: butcher paper / bone ---- */
  --mc-paper:   #F4F2ED;   /* page background — warm off-white */
  --mc-bone:    #FBFAF7;   /* card surface */
  --mc-cream:   #EDE7DA;   /* tonal block */
  --mc-kraft:   #C9A678;   /* kraft-paper accent */

  /* ---- Support accents ---- */
  --mc-amber:   #E8A13C;   /* aged / premium accent */
  --mc-sage:    #6E7B5B;   /* herb / fresh accent */

  /* ---- Semantic ---- */
  --mc-success: #2F7D45;
  --mc-warning: #E8A13C;
  --mc-danger:  #C10F10;
  --mc-info:    #2A5B8C;

  /* ---- Semantic aliases (use these in components) ---- */
  --surface-page:    var(--mc-paper);
  --surface-card:    var(--mc-bone);
  --surface-inverse: var(--mc-charcoal);
  --surface-sunken:  var(--mc-cream);

  --text-strong:   var(--mc-ink-900);
  --text-body:     var(--mc-ink-700);
  --text-muted:    var(--mc-ink-500);
  --text-faint:    var(--mc-ink-400);
  --text-on-dark:  var(--mc-paper);
  --text-on-red:   #FFFFFF;

  --action-primary:        var(--mc-red);
  --action-primary-hover:  var(--mc-red-deep);
  --action-ink:            var(--mc-charcoal);
  --action-ink-hover:      #000000;

  --border-strong:  var(--mc-ink-900);
  --border-default: var(--mc-ink-200);
  --border-subtle:  var(--mc-ink-100);

  --focus-ring: var(--mc-red);
}

/* Meat Connection — Typography tokens */
:root {
  /* ---- Families ---- */
  --font-display: 'Oswald', 'Arial Narrow', sans-serif;  /* condensed, uppercase headings */
  --font-body:    'Archivo', system-ui, -apple-system, sans-serif;
  --font-mono:    ui-monospace, 'SF Mono', Menlo, monospace;

  /* ---- Weights ---- */
  --fw-regular: 400; /* @kind other */
  --fw-medium:  500; /* @kind other */
  --fw-semibold:600; /* @kind other */
  --fw-bold:    700; /* @kind other */

  /* ---- Type scale (display uses condensed font, tight leading, uppercase) ---- */
  --fs-display-xl: 72px;
  --fs-display-l:  56px;
  --fs-display-m:  40px;
  --fs-display-s:  30px;

  --fs-heading-l: 24px;
  --fs-heading-m: 20px;
  --fs-heading-s: 17px;

  --fs-body-l: 18px;
  --fs-body-m: 16px;
  --fs-body-s: 14px;
  --fs-caption:12px;

  /* ---- Line heights ---- */
  --lh-tight:   1.02; /* @kind other */
  --lh-snug:    1.15; /* @kind other */
  --lh-normal:  1.5; /* @kind other */
  --lh-relaxed: 1.65; /* @kind other */

  /* ---- Tracking ---- */
  --ls-display: -0.01em; /* @kind other */
  --ls-eyebrow: 0.18em; /* @kind other */
  --ls-tight:   -0.02em; /* @kind other */
}

/* Meat Connection — Spacing & layout tokens (4px base grid) */
:root {
  --space-0: 0;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10:40px;
  --space-12:48px;
  --space-16:64px;
  --space-20:80px;
  --space-24:96px;

  /* Layout */
  --container-max: 1200px;
  --container-pad: 24px;
}

/* Meat Connection — Radii, borders, shadows
   The brand is industrial/butcher: corners are SHARP. Radii are minimal;
   only pills (badges/tags) and avatars go fully round. */
:root {
  /* ---- Radii ---- */
  --radius-0:  0px;
  --radius-sm: 2px;
  --radius-md: 4px;
  --radius-lg: 8px;
  --radius-pill: 999px;

  /* ---- Border widths ---- */
  --bw-hair: 1px;
  --bw-2:    2px;
  --bw-heavy:3px;   /* butcher-block heavy rule */

  /* ---- Shadows (low, grounded — no glow) ---- */
  --shadow-sm: 0 1px 2px rgba(20,20,20,0.08);
  --shadow-md: 0 2px 8px rgba(20,20,20,0.10);
  --shadow-lg: 0 12px 32px rgba(20,20,20,0.16);
  /* hard offset shadow — stamped / label feel */
  --shadow-stamp: 4px 4px 0 var(--mc-charcoal);

  /* ---- Motion ---- */
  --ease-out: cubic-bezier(0.2, 0.7, 0.2, 1); /* @kind other */
  --ease-in-out: cubic-bezier(0.5, 0, 0.2, 1); /* @kind other */
  --dur-fast: 120ms; /* @kind other */
  --dur-med:  200ms; /* @kind other */
  --dur-slow: 320ms; /* @kind other */
}

* { box-sizing:border-box; }
body { margin:0; background:var(--surface-page); font-family:var(--font-body); -webkit-font-smoothing:antialiased; }
a { color:inherit; }
::-webkit-scrollbar { width:10px; } ::-webkit-scrollbar-thumb { background:var(--mc-ink-300); border-radius:999px; }

@media (max-width: 860px){
  .mc-hero{ grid-template-columns:1fr !important; gap:28px !important; padding:48px 20px !important; }
  .mc-h1{ font-size:54px !important; }
  .mc-pdp{ grid-template-columns:1fr !important; gap:24px !important; }
  .mc-foot{ grid-template-columns:1fr 1fr !important; gap:28px !important; }
  .mc-nav, .mc-search{ display:none !important; }
}
@media (max-width: 520px){
  .mc-h1{ font-size:42px !important; }
  .mc-stats{ flex-wrap:wrap; gap:18px !important; }
  .mc-foot{ grid-template-columns:1fr !important; }
  .mc-trust{ flex-direction:column; gap:8px !important; }
}

  const [sent, setSent] = React.useState(false);
  const channels = [
    ['MessageCircle','WhatsApp',WA_DISPLAY,WA_LINK],
    ['Instagram','Instagram','@meatconnectionmx',IG_LINK],
    ['Facebook','Facebook','@meatconnectionmx',FB_LINK],

    <section id="contacto" style={{ background:'var(--surface-sunken)', scrollMarginTop:'72px' }}>
      <div className="mc-contact" style={{ maxWidth:'var(--container-max)', margin:'0 auto', padding:'72px 24px', display:'grid', gridTemplateColumns:'1fr 1fr', gap:'48px', alignItems:'start' }}>

            sub="Solicita catálogos, precios de mayoreo y tiempos de entrega. Te atendemos de forma personalizada." />
          <div style={{ display:'flex', flexDirection:'column', gap:'14px', marginTop:'8px' }}>
            {channels.map(([ic,name,label,href]) => (
              <a key={name} href={href} target="_blank" rel="noopener" style={{ display:'flex', alignItems:'center', gap:'14px', textDecoration:'none', color:'var(--text-strong)' }}>
                <span style={{ width:'44px', height:'44px', borderRadius:'var(--radius-md)', background:'var(--mc-charcoal)', display:'flex', alignItems:'center', justifyContent:'center', flex:'none' }}>
                  <Icon name={ic} size={20} color="#fff" />
                </span>
                <span>
                  <span style={{ display:'block', fontFamily:'var(--font-display)', textTransform:'uppercase', letterSpacing:'0.06em', fontSize:'12px', color:'var(--text-muted)' }}>{name}</span>
                  <span style={{ fontFamily:'var(--font-body)', fontSize:'15px', fontWeight:600 }}>{label}</span>
                </span>
              </a>
            ))}
          </div>
        </div>
        <div style={{ background:'var(--surface-card)', border:'1px solid var(--border-default)', borderRadius:'var(--radius-md)', padding:'28px' }}>
          {sent ? (
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', textAlign:'center', gap:'12px', padding:'32px 0' }}>
              <Icon name="CheckCircle2" size={44} color="var(--mc-success)" />
              <div style={{ fontFamily:'var(--font-display)', textTransform:'uppercase', fontWeight:700, fontSize:'22px', color:'var(--text-strong)' }}>¡Gracias!</div>
              <p style={{ fontFamily:'var(--font-body)', fontSize:'14px', color:'var(--text-muted)', margin:0 }}>Recibimos tu solicitud. Para atención inmediata, escríbenos por WhatsApp.</p>
              <Button variant="primary" onClick={onQuote} iconLeft={<Icon name="MessageCircle" size={16} color="#fff" />}>Abrir WhatsApp</Button>
            </div>
          ) : (
            <form onSubmit={(e) => { e.preventDefault(); setSent(true); }} style={{ display:'flex', flexDirection:'column', gap:'16px' }}>

              <Button variant="primary" size="lg" fullWidth type="submit">Enviar solicitud</Button>
            </form>
          )}
        </div>
      </div>
    </section>
  );
}

/* ===== Botón flotante de WhatsApp ===== */
function WhatsAppFab() {
  return (
    <a href={WA_LINK} target="_blank" rel="noopener" aria-label="Cotizar por WhatsApp"
      style={{ position:'fixed', right:'22px', bottom:'22px', width:'58px', height:'58px', borderRadius:'999px', background:'#25D366', boxShadow:'var(--shadow-lg)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:45 }}>
      <Icon name="MessageCircle" size={28} color="#fff" />
    </a>
  );
}

function App() {
  const [view, setView] = React.useState('home');
  const [active, setActive] = React.useState(null);
  const [cat, setCat] = React.useState('Todos');
  const [cartOpen, setCartOpen] = React.useState(false);
  const [cart, setCart] = React.useState([]);
  function add(product, qty = 1) {
    setCart((c) => { const ex = c.find((i) => i.id === product.id);
      if (ex) return c.map((i) => i.id === product.id ? { ...i, qty:i.qty+qty } : i);
      return [...c, { ...product, qty }]; });
    setCartOpen(true);
  }
  function changeQty(item, d) { setCart((c) => c.map((i) => i.id === item.id ? { ...i, qty:Math.max(1, i.qty+d) } : i)); }
  function remove(item) { setCart((c) => c.filter((i) => i.id !== item.id)); }
  function open(product) { setActive(product); setView('product'); window.scrollTo(0,0); }
  function nav(v) { setView(v); window.scrollTo(0,0); }
  function goAnchor(id) { setView('home'); setTimeout(() => { const el = document.getElementById(id); if (el) el.scrollIntoView({ behavior:'smooth' }); }, 60); }
  function quote() { openWhatsApp(); }
  const count = cart.reduce((s, i) => s + i.qty, 0);
  const filtered = cat === 'Todos' ? PRODUCTS : PRODUCTS.filter((p) => p.cat === cat);
  return (
    <div style={{ background:'var(--surface-page)', minHeight:'100vh' }}>
      <Header cartCount={count} onCart={() => setCartOpen(true)} onNav={nav} onAnchor={goAnchor} />
      {view === 'home' && (<>
        <Hero onShop={() => nav('shop')} onQuote={quote} feature={PRODUCTS[0]} />
        <Services />
        <section style={{ maxWidth:'var(--container-max)', margin:'0 auto', padding:'64px 24px' }}>
          <div style={{ display:'flex', alignItems:'flex-end', justifyContent:'space-between', marginBottom:'28px' }}>
            <div>
              <div style={{ fontFamily:'var(--font-display)', textTransform:'uppercase', letterSpacing:'0.18em', fontWeight:600, fontSize:'13px', color:'var(--mc-red)' }}>Del Mostrador</div>
              <h2 style={{ fontFamily:'var(--font-display)', textTransform:'uppercase', fontWeight:700, fontSize:'40px', margin:'6px 0 0', color:'var(--text-strong)' }}>Cortes Más Vendidos</h2>
            </div>
            <button onClick={() => nav('shop')} style={{ border:'none', background:'transparent', cursor:'pointer', display:'flex', alignItems:'center', gap:'8px', fontFamily:'var(--font-display)', textTransform:'uppercase', letterSpacing:'0.06em', fontWeight:600, fontSize:'14px', color:'var(--text-strong)' }}>Ver Todo <Icon name="ArrowRight" size={16} /></button>
          </div>
          <ProductGrid products={PRODUCTS.slice(0,4)} onAdd={add} onOpen={open} />
        </section>
        <Partners />
        <Clients />
        <ContactSection onQuote={quote} />
      </>)}
      {view === 'shop' && (
        <section style={{ maxWidth:'var(--container-max)', margin:'0 auto', padding:'40px 24px 80px' }}>
          <h1 style={{ fontFamily:'var(--font-display)', textTransform:'uppercase', fontWeight:700, fontSize:'48px', margin:'0 0 8px', color:'var(--text-strong)' }}>El Catálogo</h1>
          <p style={{ fontFamily:'var(--font-body)', fontSize:'16px', color:'var(--text-muted)', margin:'0 0 28px' }}>{filtered.length} cortes · porcionados a tu medida</p>
          <ShopToolbar active={cat} onPick={setCat} />
          <ProductGrid products={filtered} onAdd={add} onOpen={open} />
        </section>
      )}
      {view === 'product' && active && (<ProductDetail product={active} onAdd={add} onBack={() => nav('shop')} />)}
      <Footer />
      <CartDrawer open={cartOpen} items={cart} onClose={() => setCartOpen(false)} onQty={changeQty} onRemove={remove} />
      <WhatsAppFab />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
